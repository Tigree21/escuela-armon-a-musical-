<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>H.M.A.S. Armonía Musical</title>
  <style>
    body { font-family: Inter, sans-serif; background: #0a1628; color: #fff;
           display: flex; justify-content: center; align-items: center;
           min-height: 100vh; margin: 0; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(201,168,76,0.3);
               border-top-color: #c9a84c; border-radius: 50%; animation: spin 0.8s linear infinite;
               margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    (function() {
      var path = window.location.pathname;
      if (path.indexOf('/escuela-armon-a-musical-') !== 0) {
        var repoName = path.split('/')[1];
        sessionStorage.setItem('redirect', path + window.location.search);
        window.location.replace('/' + repoName + '/');
      }
    })();
  </script>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <p style="color:#c9a84c;font-weight:600;">Redireccionando...</p>
  </div>
</body>
</html>
